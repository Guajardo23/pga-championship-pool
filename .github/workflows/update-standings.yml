name: Update PGA Championship Standings

on:
  schedule:
    # Thu-Sat (May 14-16): every hour, 7am-4pm ET (11:00-20:00 UTC)
    - cron: '0 11-20 14-16 5 *'
    # Sun (May 17): every hour, 8am-noon ET (12:00-16:00 UTC)
    - cron: '0 12-15 17 5 *'
    # Sun (May 17): every 5 min, noon-5pm ET (16:00-21:00 UTC)
    - cron: '*/5 16-21 17 5 *'
  workflow_dispatch:  # manual trigger button in GitHub UI

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Scrape standings
        run: python scrape_standings.py

      - name: Generate site
        run: python generate_site.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add standings.json index.html
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            TIMESTAMP=$(TZ='America/New_York' date '+%b %d %I:%M %p ET')
            git commit -m "Update standings: $TIMESTAMP"
            git push
          fi
